<!DOCTYPE html>
<html lang="fa" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه پایش فیلترینگ | Censorship Monitor</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 antialiased transition-all duration-300">

    <div class="main-card max-w-xl w-full rounded-2xl shadow-2xl p-6 border border-gray-700/50 relative">
        
        <button id="langToggle" class="absolute top-4 left-4 bg-gray-700/50 hover:bg-gray-600/50 text-xs text-gray-300 font-semibold py-1 px-3 rounded-lg border border-gray-600 cursor-pointer transition">
            English
        </button>

        <header class="text-center mb-6 mt-4">
            <h1 id="title" class="text-2xl font-black text-blue-400 mb-2">سامانه پایش هوشمند فیلترینگ</h1>
            <p id="subtitle" class="text-gray-400 text-sm">بررسی چندلایه دسترسی به وب‌سایت‌ها بر اساس اختلالات شبکه</p>
        </header>

        <section class="inner-section p-4 rounded-xl border border-gray-700/40 mb-6 shadow-md">
            <form id="instantCheckerForm" class="space-y-3">
                <div>
                    <label id="instantLabel" for="instantUrlInput" class="block text-xs font-bold text-blue-400 uppercase tracking-wider mb-1">🔍 تست سریع و آنی یک سایت</label>
                    <div class="flex gap-2">
                        <input 
                            type="text" 
                            id="instantUrlInput" 
                            placeholder="example.com" 
                            required
                            class="flex-1 px-4 py-2 bg-gray-900/40 border border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-white text-left placeholder-gray-500 text-sm"
                            dir="ltr"
                        >
                        <button 
                            type="submit" 
                            id="instantSubmitBtn"
                            class="btn-primary text-white font-bold py-2 px-5 rounded-xl transition duration-200 cursor-pointer whitespace-nowrap text-xs shadow-md"
                        >
                            بررسی آنی
                        </button>
                    </div>
                </div>
            </form>
            <div id="instantResult" class="mt-3 hidden p-3 rounded-xl text-center font-bold border text-sm transition-all"></div>
        </section>

        <section class="mb-6">
            <form id="addToListForm" class="space-y-2">
                <div>
                    <label id="addListLabel" for="listUrlInput" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">➕ افزودن وب‌سایت جدید به لیست پایش شما</label>
                    <div class="flex gap-2">
                        <input 
                            type="text" 
                            id="listUrlInput" 
                            placeholder="mysite.com" 
                            required
                            class="flex-1 px-4 py-2 bg-gray-900/20 border border-gray-600/70 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:outline-none text-white text-left placeholder-gray-500 text-sm"
                            dir="ltr"
                        >
                        <button 
                            type="submit" 
                            id="listSubmitBtn"
                            class="btn-secondary text-white font-bold py-2 px-4 rounded-xl transition duration-200 cursor-pointer whitespace-nowrap text-xs shadow-md"
                        >
                            افزودن به لیست
                        </button>
                    </div>
                </div>
            </form>
        </section>

        <hr class="border-gray-700 my-5">

        <section>
            <div class="flex justify-between items-center mb-4">
                <h3 id="quickCheckTitle" class="text-xs font-bold text-gray-400 uppercase tracking-wider">وضعیت سرویس‌های پایش شده</h3>
                <button id="checkAllBtn" class="text-xs font-semibold text-blue-400 hover:text-blue-300 cursor-pointer transition">
                    تست همه همزمان ⚡
                </button>
            </div>
            
            <div id="targetsGrid" class="space-y-2.5 max-h-[320px] overflow-y-auto pr-1">
                </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
