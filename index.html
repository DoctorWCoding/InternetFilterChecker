<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Accessibility Checker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-gray-800 rounded-xl shadow-2xl p-6 border border-gray-700">
        <h1 class="text-2xl font-bold text-center mb-2 text-blue-400">آیا سایت فیلتر است؟</h1>
        <p class="text-gray-400 text-sm text-center mb-6">Check if a website is accessible on your current internet connection.</p>

        <form id="checkerForm" class="space-y-4">
            <div>
                <label for="urlInput" class="block text-sm font-medium text-gray-300 mb-1">Website URL</label>
                <input 
                    type="text" 
                    id="urlInput" 
                    placeholder="example.com" 
                    required
                    class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-white"
                >
            </div>
            <button 
                type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200"
            >
                Check Status
            </button>
        </form>

        <div id="result" class="mt-6 hidden p-4 rounded-lg text-center font-medium">
            </div>
    </div>

    <script>
        document.getElementById('checkerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const input = document.getElementById('urlInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            // Clean up the URL input (ensure it has https://)
            let url = input;
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            // Reset UI to loading state
            resultDiv.className = "mt-6 p-4 rounded-lg text-center font-medium bg-gray-700 text-gray-300";
            resultDiv.innerText = "Checking... Please wait.";
            resultDiv.classList.remove('hidden');

            // Setup a timeout controller (if it takes longer than 5 seconds, assume blocked)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);

            try {
                // We use 'no-cors' because we only care if the server responds, 
                // we don't need to read the website's actual data.
                await fetch(url, { mode: 'no-cors', signal: controller.signal });
                
                // If fetch doesn't throw an error, the user's internet successfully reached the site
                clearTimeout(timeoutId);
                resultDiv.className = "mt-6 p-4 rounded-lg text-center font-bold bg-green-900/50 text-green-400 border border-green-600";
                resultDiv.innerText = "✅ Accessible! This site is NOT filtered on your connection.";
                
            } catch (error) {
                clearTimeout(timeoutId);
                
                // If it timed out or network failed, it's highly likely filtered
                resultDiv.className = "mt-6 p-4 rounded-lg text-center font-bold bg-red-900/50 text-red-400 border border-red-600";
                resultDiv.innerText = "❌ Blocked / Unreachable. This site is likely filtered.";
            }
        });
    </script>
</body>
</html>
